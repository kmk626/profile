<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>自己紹介</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>自己紹介</h1>
    <h2>北百夏</h2>

    <p><strong>名前：</strong>北 百夏</p>
    <p><strong>趣味：</strong>ゲーム・音楽・インターネット</p>
    <p><strong>好きな食べ物：</strong>ラーメン</p>
    <p><strong>一言：</strong>よろしくお願いします！</p>
</div>

</body>
</html>
